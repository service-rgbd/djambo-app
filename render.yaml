services:
  - type: web
    name: fleetcommand-api
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_URL
        value: https://djambo-app.com
      - key: API_URL
        value: https://api.djambo-app.com
      - key: ALLOWED_ORIGINS
        value: https://djambo-app.com,https://www.djambo-app.com
      - key: RESEND_FROM_EMAIL
        value: noreply@djambo-app.com
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: UPLOAD_STORAGE_PROVIDER
        value: r2
      - key: MAX_UPLOAD_SIZE_MB
        value: 10
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OPEN_AI_CHAT_BOT
        sync: false
      - key: WEB_PUSH_PUBLIC_KEY
        sync: false
      - key: WEB_PUSH_PRIVATE_KEY
        sync: false
      - key: WEB_PUSH_SUBJECT
        value: mailto:support@djambo-app.com
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemini-2.0-flash-001
      - key: AI_CACHE_TTL_MS
        value: 21600000

  - type: web
    name: fleetcommand-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.djambo-app.com
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false