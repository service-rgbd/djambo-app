services:
  - type: web
    name: fleetcommand-api
    env: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: APP_URL
        value: https://djambo-app.com
      - key: API_URL
        value: https://fleetcommand-api.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://djambo-app.com,https://www.djambo-app.com
      - key: RESEND_FROM_EMAIL
        value: noreply@djambo-app.com
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: web
    name: fleetcommand-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://fleetcommand-api.onrender.com